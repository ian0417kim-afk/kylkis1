<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김유라 학습일지</title>
  <meta name="theme-color" content="#2C4A3E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="박정환 학습일지" />
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%EB%B0%95%EC%A0%95%ED%99%98%20%ED%95%99%EC%8A%B5%EC%9D%BC%EC%A7%80%22%2C%22short_name%22%3A%22%ED%95%99%EC%8A%B5%EC%9D%BC%EC%A7%80%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F7F5F0%22%2C%22theme_color%22%3A%22%232C4A3E%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%2520viewBox%3D'0%25200%252064%252064'%253E%253Crect%2520width%3D'64'%2520height%3D'64'%2520rx%3D'14'%2520fill%3D'%25232C4A3E'%2F%253E%253Ctext%2520x%3D'32'%2520y%3D'44'%2520text-anchor%3D'middle'%2520font-size%3D'36'%253E%25F0%259F%2593%2596%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ==========================================
       CONFIG — EmailJS 설정값
       아래 3가지를 EmailJS 계정에서 받아 입력하세요
       ========================================== */

    :root {
      --bg:          #F7F5F0;
      --surface:     #FFFFFF;
      --border:      #E4DED3;
      --primary:     #2C4A3E;
      --primary-lt:  #3D6557;
      --accent:      #C8873A;
      --accent-lt:   #F0C98A;
      --text-main:   #1C2B26;
      --text-sub:    #6B7D77;
      --text-muted:  #A8B5B0;
      --danger:      #C0392B;
      --success:     #27AE60;
      --radius-sm:   8px;
      --radius-md:   14px;
      --radius-lg:   20px;
      --shadow-sm:   0 2px 8px rgba(44,74,62,0.07);
      --shadow-md:   0 4px 20px rgba(44,74,62,0.10);
      --transition:  0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--primary);
      padding: 28px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(44,74,62,0.18);
    }
    .app-header .inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .app-header h1 {
      font-family: 'Gowun Batang', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .app-header h1 span {
      color: var(--accent-lt);
    }
    .date-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── MAIN SCROLL ── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── SECTION CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .card-icon.green  { background: #E8F5F0; }
    .card-icon.amber  { background: #FEF3E2; }
    .card-icon.blue   { background: #E8EFF9; }
    .card-icon.rose   { background: #FDE8E8; }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── FORM ELEMENTS ── */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }
    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      resize: none;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(44,74,62,0.08);
    }
    textarea {
      min-height: 90px;
      line-height: 1.6;
    }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    /* ── 학습 기록 ── */
    .study-entries { display: flex; flex-direction: column; gap: 16px; }

    .study-entry {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      position: relative;
    }
    .study-entry-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .entry-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .remove-entry {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color var(--transition), background var(--transition);
      line-height: 1;
    }
    .remove-entry:hover { color: var(--danger); background: #FDE8E8; }

    .add-btn {
      width: 100%;
      padding: 11px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      background: none;
      color: var(--primary-lt);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-btn:hover {
      border-color: var(--primary);
      background: #E8F5F0;
    }

    /* ── 과제 기록 ── */
    .task-entries { display: flex; flex-direction: column; gap: 12px; }

    .task-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .task-entry-main { display: flex; flex-direction: column; gap: 8px; }
    .task-row { display: flex; gap: 8px; align-items: center; }
    .task-row input[type="text"] { flex: 1; }

    .done-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .done-toggle input[type="checkbox"] { display: none; }
    .done-box {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      background: #fff;
    }
    .done-toggle input:checked + .done-box {
      background: var(--success);
      border-color: var(--success);
    }
    .done-check-icon { display: none; color: #fff; font-size: 0.7rem; font-weight: 900; }
    .done-toggle input:checked ~ .done-check-icon,
    .done-toggle input:checked + .done-box .done-check-icon { display: block; }
    .done-box .done-check-icon { display: none; }
    .done-toggle input:checked + .done-box .done-check-icon { display: flex; }

    /* ── 메타인지 ── */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 400px) {
      .meta-grid { grid-template-columns: 1fr; }
    }

    /* Condition Stars */
    .star-row {
      display: flex;
      gap: 4px;
    }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      opacity: 0.25;
      transition: opacity var(--transition), transform 0.15s ease;
      padding: 2px;
      line-height: 1;
    }
    .star-btn.active { opacity: 1; }
    .star-btn:hover { transform: scale(1.15); }

    /* Emotion Pills */
    .emotion-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .emotion-pill {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-sub);
    }
    .emotion-pill:hover { border-color: var(--primary); color: var(--primary); }
    .emotion-pill.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── 독서 기록 ── */

    /* ── 제출 버튼 ── */
    .submit-area {
      padding: 0 0 8px;
    }
    .submit-btn {
      width: 100%;
      padding: 17px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background var(--transition), transform 0.15s ease, box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(44,74,62,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--primary-lt);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(44,74,62,0.30);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .submit-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-main);
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* 반응형 */
    @media (max-width: 480px) {
      .card { padding: 18px; }
      .app-header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header class="app-header">
  <div class="inner">
    <h1>김유라 <span>학습일지</span></h1>
    <span class="date-badge" id="headerDate"></span>
  </div>
</header>

<!-- ======= MAIN SCROLL ======= -->
<main class="main">

  <!-- 1. 학습 기록 -->
  <div class="card" id="studyCard">
    <div class="card-header">
      <div class="card-icon green">📚</div>
      <div>
        <div class="card-title">학습 기록</div>
        <div class="card-sub">오늘 배운 것과 느낌을 과목별로 기록해요</div>
      </div>
    </div>

    <div class="study-entries" id="studyEntries"></div>

    <button class="add-btn" id="addStudyBtn" onclick="addStudyEntry()">
      <span>+</span> 과목 추가
    </button>
  </div>

  <!-- 2. 과제 기록 -->
  <div class="card" id="taskCard">
    <div class="card-header">
      <div class="card-icon amber">✏️</div>
      <div>
        <div class="card-title">과제 기록</div>
        <div class="card-sub">오늘의 과제와 완료 여부를 기록해요</div>
      </div>
    </div>

    <div class="task-entries" id="taskEntries"></div>

    <button class="add-btn" id="addTaskBtn" onclick="addTaskEntry()">
      <span>+</span> 과제 추가
    </button>
  </div>

  <!-- 3. 메타인지 -->
  <div class="card" id="metaCard">
    <div class="card-header">
      <div class="card-icon blue">🧠</div>
      <div>
        <div class="card-title">오늘의 나</div>
        <div class="card-sub">컨디션, 감정, 자기 점검</div>
      </div>
    </div>

    <div class="meta-grid">
      <div>
        <label>오늘 컨디션</label>
        <div class="star-row" id="conditionStars">
          <button class="star-btn" data-val="1" onclick="setCondition(1)">⭐</button>
          <button class="star-btn" data-val="2" onclick="setCondition(2)">⭐</button>
          <button class="star-btn" data-val="3" onclick="setCondition(3)">⭐</button>
          <button class="star-btn" data-val="4" onclick="setCondition(4)">⭐</button>
          <button class="star-btn" data-val="5" onclick="setCondition(5)">⭐</button>
        </div>
      </div>
      <div>
        <label>오늘 감정</label>
        <div class="emotion-row" id="emotionRow">
          <span class="emotion-pill" onclick="toggleEmotion(this)">😊 좋음</span>
          <span class="emotion-pill" onclick="toggleEmotion(this)">😐 보통</span>
          <span class="emotion-pill" onclick="toggleEmotion(this)">😔 힘듦</span>
          <span class="emotion-pill" onclick="toggleEmotion(this)">😤 집중</span>
          <span class="emotion-pill" onclick="toggleEmotion(this)">😴 피곤</span>
          <span class="emotion-pill" onclick="toggleEmotion(this)">😰 불안</span>
        </div>
      </div>
    </div>

    <div class="field">
      <label>한 줄 자기평가</label>
      <input type="text" id="selfEval" placeholder="오늘 나는 어땠나요? 솔직하게 한 줄로..." maxlength="100" />
    </div>
  </div>

  <!-- 4. 독서 기록 -->
  <div class="card" id="bookCard">
    <div class="card-header">
      <div class="card-icon rose">📖</div>
      <div>
        <div class="card-title">독서 기록</div>
        <div class="card-sub">오늘 읽은 책을 기록해요 (없으면 비워도 돼요)</div>
      </div>
    </div>

    <div class="field">
      <label>책 제목</label>
      <input type="text" id="bookTitle" placeholder="책 제목을 입력하세요" />
    </div>
    <div class="field">
      <label>읽은 분량</label>
      <input type="text" id="bookRange" placeholder="예: p.1 ~ p.45, 1장~3장" />
    </div>
    <div class="field">
      <label>소감</label>
      <textarea id="bookReview" placeholder="읽으면서 느낀 점이나 기억에 남는 내용을 적어요..."></textarea>
    </div>
  </div>

  <!-- 제출 -->
  <div class="submit-area">
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      <span>📬</span> 선생님께 제출하기
    </button>
    <p class="submit-hint">ian0417kim@gmail.com · ginnie1004@gmail.com 으로 자동 발송됩니다</p>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ======= SCRIPT ======= -->
<script>
  /* ================================================
     ⚙️  EmailJS 설정 (아래 3가지 값만 변경하세요)
     1. emailjs.com 에서 무료 계정 생성
     2. Email Service 연결 → Service ID 복사
     3. Email Template 생성 → Template ID 복사
     4. Account > API Keys → Public Key 복사
     ================================================ */
  const EMAILJS_PUBLIC_KEY  = '9V25CWE1x11AFG7_k';
  const EMAILJS_SERVICE_ID  = 'ian0417kim@gmail.com';
  const EMAILJS_TEMPLATE_ID = 'template_efb3432';

  const RECIPIENTS = [
    'ian0417kim@gmail.com',
    'ginnie1004@gmail.com'
  ];

  /* ================================================
     상태
     ================================================ */
  let studyCount   = 0;
  let taskCount    = 0;
  let conditionVal = 0;
  let selectedEmotion = '';

  /* ================================================
     날짜 헤더
     ================================================ */
  const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

  function formatDate(d) {
    const y  = d.getFullYear();
    const m  = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const w  = WEEKDAYS[d.getDay()];
    return `${y}.${m}.${dd} (${w})`;
  }

  document.getElementById('headerDate').textContent = formatDate(new Date());

  /* ================================================
     학습 기록 — 항목 추가/삭제
     ================================================ */
  function addStudyEntry() {
    studyCount++;
    const idx = studyCount;
    const container = document.getElementById('studyEntries');

    const el = document.createElement('div');
    el.className = 'study-entry';
    el.id = `study-${idx}`;
    el.innerHTML = `
      <div class="study-entry-header">
        <div class="entry-num">${idx}</div>
        <button class="remove-entry" onclick="removeStudyEntry(${idx})" aria-label="삭제">✕</button>
      </div>
      <div class="field">
        <label>과목명</label>
        <input type="text" id="subject-${idx}" placeholder="예: 수학, 영어, 과학..." maxlength="30" />
      </div>
      <div class="field">
        <label>오늘 배운 내용</label>
        <textarea id="studyContent-${idx}" placeholder="오늘 무엇을 배웠나요? 주요 내용을 적어요..."></textarea>
      </div>
      <div class="field">
        <label>배우면서 느낀 점</label>
        <textarea id="studyFeel-${idx}" placeholder="어려웠나요? 재미있었나요? 솔직하게 적어요..."></textarea>
      </div>
    `;
    container.appendChild(el);
  }

  function removeStudyEntry(idx) {
    const el = document.getElementById(`study-${idx}`);
    if (el) el.remove();
  }

  /* ================================================
     과제 기록 — 항목 추가/삭제
     ================================================ */
  function addTaskEntry() {
    taskCount++;
    const idx = taskCount;
    const container = document.getElementById('taskEntries');

    const el = document.createElement('div');
    el.className = 'task-entry';
    el.id = `task-${idx}`;
    el.innerHTML = `
      <div class="task-entry-main">
        <div class="task-row">
          <input type="text" id="taskName-${idx}" placeholder="과제명을 입력하세요" />
          <label class="done-toggle">
            <input type="checkbox" id="taskDone-${idx}" />
            <div class="done-box">
              <span class="done-check-icon">✓</span>
            </div>
            <span style="font-size:0.78rem;color:var(--text-sub);font-weight:600;">완료</span>
          </label>
        </div>
        <textarea id="taskMemo-${idx}" placeholder="내용 또는 메모 (선택)" style="min-height:60px;"></textarea>
      </div>
      <button class="remove-entry" onclick="removeTaskEntry(${idx})" style="margin-top:2px;" aria-label="삭제">✕</button>
    `;
    container.appendChild(el);
  }

  function removeTaskEntry(idx) {
    const el = document.getElementById(`task-${idx}`);
    if (el) el.remove();
  }

  /* ================================================
     메타인지 — 컨디션 / 감정
     ================================================ */
  function setCondition(val) {
    conditionVal = val;
    document.querySelectorAll('#conditionStars .star-btn').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.val) <= val);
    });
  }

  function toggleEmotion(el) {
    const isSelected = el.classList.contains('selected');
    document.querySelectorAll('#emotionRow .emotion-pill').forEach(p => p.classList.remove('selected'));
    if (!isSelected) {
      el.classList.add('selected');
      selectedEmotion = el.textContent.trim();
    } else {
      selectedEmotion = '';
    }
  }

  /* ================================================
     데이터 수집
     ================================================ */
  function collectStudyData() {
    const entries = document.querySelectorAll('.study-entry');
    return Array.from(entries).map((entry, i) => {
      const match = entry.id.match(/study-(\d+)/);
      const idx   = match ? match[1] : i + 1;
      return {
        subject: (document.getElementById(`subject-${idx}`)?.value || '').trim(),
        content: (document.getElementById(`studyContent-${idx}`)?.value || '').trim(),
        feel:    (document.getElementById(`studyFeel-${idx}`)?.value || '').trim(),
      };
    }).filter(e => e.subject || e.content);
  }

  function collectTaskData() {
    const entries = document.querySelectorAll('.task-entry');
    return Array.from(entries).map((entry, i) => {
      const match = entry.id.match(/task-(\d+)/);
      const idx   = match ? match[1] : i + 1;
      return {
        name: (document.getElementById(`taskName-${idx}`)?.value || '').trim(),
        done: document.getElementById(`taskDone-${idx}`)?.checked ? '✅ 완료' : '⬜ 미완료',
        memo: (document.getElementById(`taskMemo-${idx}`)?.value || '').trim(),
      };
    }).filter(e => e.name);
  }

  function collectAllData() {
    return {
      date:      formatDate(new Date()),
      study:     collectStudyData(),
      tasks:     collectTaskData(),
      condition: conditionVal > 0 ? '⭐'.repeat(conditionVal) + ` (${conditionVal}/5)` : '미입력',
      emotion:   selectedEmotion || '미입력',
      selfEval:  (document.getElementById('selfEval')?.value || '').trim(),
      bookTitle: (document.getElementById('bookTitle')?.value || '').trim(),
      bookRange: (document.getElementById('bookRange')?.value || '').trim(),
      bookReview:(document.getElementById('bookReview')?.value || '').trim(),
    };
  }

  /* ================================================
     이메일 본문 생성
     ================================================ */
  function buildEmailBody(data) {
    const lines = [];

    lines.push(`📅 날짜: ${data.date}`);
    lines.push(`학생: 김유라\n`);

    lines.push('━━━━━━━━━━━━━━━━━━━━');
    lines.push('📚 학습 기록');
    lines.push('━━━━━━━━━━━━━━━━━━━━');
    if (data.study.length > 0) {
      data.study.forEach((s, i) => {
        lines.push(`\n[${i + 1}] 과목: ${s.subject || '(미입력)'}`);
        lines.push(`배운 내용: ${s.content || '(미입력)'}`);
        lines.push(`느낀 점: ${s.feel || '(미입력)'}`);
      });
    } else {
      lines.push('(기록 없음)');
    }

    lines.push('\n━━━━━━━━━━━━━━━━━━━━');
    lines.push('✏️ 과제 기록');
    lines.push('━━━━━━━━━━━━━━━━━━━━');
    if (data.tasks.length > 0) {
      data.tasks.forEach((t, i) => {
        lines.push(`\n[${i + 1}] ${t.name} — ${t.done}`);
        if (t.memo) lines.push(`메모: ${t.memo}`);
      });
    } else {
      lines.push('(기록 없음)');
    }

    lines.push('\n━━━━━━━━━━━━━━━━━━━━');
    lines.push('🧠 오늘의 나 (메타인지)');
    lines.push('━━━━━━━━━━━━━━━━━━━━');
    lines.push(`컨디션: ${data.condition}`);
    lines.push(`감정 상태: ${data.emotion}`);
    lines.push(`자기평가: ${data.selfEval || '(미입력)'}`);

    lines.push('\n━━━━━━━━━━━━━━━━━━━━');
    lines.push('📖 독서 기록');
    lines.push('━━━━━━━━━━━━━━━━━━━━');
    if (data.bookTitle) {
      lines.push(`책 제목: ${data.bookTitle}`);
      lines.push(`읽은 분량: ${data.bookRange || '(미입력)'}`);
      lines.push(`소감: ${data.bookReview || '(미입력)'}`);
    } else {
      lines.push('(오늘은 독서 없음)');
    }

    return lines.join('\n');
  }

  /* ================================================
     localStorage 저장 (임시 보관)
     ================================================ */
  const STORAGE_KEY = 'park_jeonghwan_draft';

  function saveDraft() {
    try {
      const data = collectAllData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (_) { /* 무시 */ }
  }

  /* ================================================
     폼 초기화 (제출 후 다음날 입력 준비)
     ================================================ */
  function resetForm() {
    document.getElementById('headerDate').textContent = formatDate(new Date());

    document.getElementById('studyEntries').innerHTML = '';
    studyCount = 0;
    addStudyEntry();

    document.getElementById('taskEntries').innerHTML = '';
    taskCount = 0;
    addTaskEntry();

    conditionVal = 0;
    document.querySelectorAll('#conditionStars .star-btn').forEach(b => b.classList.remove('active'));
    selectedEmotion = '';
    document.querySelectorAll('#emotionRow .emotion-pill').forEach(p => p.classList.remove('selected'));
    document.getElementById('selfEval').value = '';

    document.getElementById('bookTitle').value  = '';
    document.getElementById('bookRange').value  = '';
    document.getElementById('bookReview').value = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ================================================
     제출
     ================================================ */
  async function handleSubmit() {
    const btn = document.getElementById('submitBtn');

    const data = collectAllData();

    // 최소 입력 검증
    const hasStudy   = data.study.length > 0;
    const hasMeta    = conditionVal > 0 || selectedEmotion || data.selfEval;

    if (!hasStudy && !hasMeta) {
      showToast('학습 기록 또는 오늘의 나 항목을 하나 이상 입력해주세요.', 'error');
      return;
    }

    // EmailJS 키 미설정 확인
    if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
      showToast('EmailJS 설정이 필요합니다. 코드 상단 설정값을 확인하세요.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> 전송 중...';

    try {
      const subject  = `[김유라 학습일지] ${data.date}`;
      const bodyText = buildEmailBody(data);

      // 두 수신자에게 순차 발송
      for (const recipient of RECIPIENTS) {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email: recipient,
          subject:  subject,
          message:  bodyText,
          date:     data.date,
        });
      }

      // 성공 처리
      saveDraft();
      showToast('✅ 제출 완료! 선생님께 전달됐어요.', 'success');
      btn.innerHTML = '<span>✅</span> 제출 완료';
      setTimeout(() => {
        resetForm();
        btn.disabled = false;
        btn.innerHTML = '<span>📬</span> 선생님께 제출하기';
      }, 2000);

    } catch (err) {
      console.error('[EmailJS Error]', err);
      showToast('전송 실패. 인터넷 연결 또는 EmailJS 설정을 확인하세요.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<span>📬</span> 선생님께 제출하기';
    }
  }

  /* ================================================
     Toast 알림
     ================================================ */
  let toastTimer = null;

  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent  = msg;
    el.className    = `toast ${type} show`;

    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.classList.remove('show');
    }, 3500);
  }

  /* ================================================
     초기 항목 자동 생성
     ================================================ */
  // EmailJS 초기화 (최초 1회)
  emailjs.init(EMAILJS_PUBLIC_KEY);

  addStudyEntry();
  addTaskEntry();

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    const SW_SCRIPT = [
      "const CACHE='pjh-v1';",
      "self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['.']))));",
      "self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));"
    ].join('');
    const swUrl = URL.createObjectURL(new Blob([SW_SCRIPT], { type: 'application/javascript' }));
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }
</script>

</body>
</html>
